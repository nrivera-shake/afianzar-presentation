<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Afianzar — Agency Onboarding</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --teal: #028090;
    --teal-700: #016774;
    --teal-50: #E6F2F4;
    --navy: #1A1F2E;
    --navy-700: #2A3142;
    --ink: #1A1F2E;
    --ink-60: #5A6172;
    --ink-40: #8A92A3;
    --line: #E5E8EE;
    --bg: #F4F6F9;
    --white: #FFFFFF;
    --coral: #DC2626;
    --coral-50: #FEF2F2;
    --amber: #D97706;
    --amber-50: #FEF7EC;
    --green: #059669;
    --green-50: #ECFDF5;
  }
  * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  html, body {
    margin: 0; padding: 0;
    font-family: 'Inter', -apple-system, system-ui, sans-serif;
    background:
      radial-gradient(ellipse 80% 60% at 20% 0%, #E6F2F4 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 90% 100%, #F0E9F5 0%, transparent 60%),
      #F4F6F9;
    color: var(--ink);
    min-height: 100vh;
  }
  .page {
    min-height: 100vh;
    display: flex; flex-direction: column;
    padding: 32px 40px 60px;
  }
  .page-head {
    display: flex; align-items: flex-end; justify-content: space-between;
    margin-bottom: 28px; flex-wrap: wrap; gap: 16px;
  }
  .page-head h1 {
    font-size: 22px; font-weight: 700; margin: 0; letter-spacing: -0.01em;
    color: var(--navy);
  }
  .page-head .meta {
    font-size: 12px; color: var(--ink-60); font-family: 'JetBrains Mono', monospace;
    text-transform: uppercase; letter-spacing: 0.08em;
  }
  .crumb {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 4px 10px; background: rgba(255,255,255,0.6); border: 1px solid var(--line);
    border-radius: 999px; font-size: 11px; color: var(--ink-60);
    font-family: 'JetBrains Mono', monospace; letter-spacing: 0.04em;
  }
  .crumb .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--teal); }

  /* The grid of phones */
  .phones {
    display: flex; gap: 56px; flex-wrap: wrap; justify-content: center;
    align-items: flex-start;
  }
  .phone-cell {
    display: flex; flex-direction: column; gap: 14px; align-items: center;
  }
  .phone-label {
    display: flex; gap: 10px; align-items: center;
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    color: var(--ink-60); letter-spacing: 0.08em; text-transform: uppercase;
  }
  .phone-label .n {
    width: 22px; height: 22px; border-radius: 6px; background: var(--navy);
    color: white; display: inline-flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 11px;
  }
  .phone-label .name { color: var(--navy); font-weight: 600; }
  .phone {
    width: 390px; height: 800px;
    background: var(--white);
    border-radius: 44px;
    box-shadow:
      0 0 0 11px #0A0E18,
      0 0 0 12px #2A3142,
      0 30px 70px -10px rgba(15, 23, 42, 0.35),
      0 10px 25px -5px rgba(15, 23, 42, 0.15);
    overflow: hidden;
    position: relative;
    display: flex; flex-direction: column;
  }
  .phone.focus {
    box-shadow:
      0 0 0 11px #0A0E18,
      0 0 0 12px #2A3142,
      0 0 0 16px rgba(2, 128, 144, 0.18),
      0 40px 80px -10px rgba(2, 128, 144, 0.35);
  }

  /* Status bar */
  .statusbar {
    height: 44px; padding: 0 28px;
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
    font-size: 14px; font-weight: 600; color: var(--navy);
  }
  .statusbar .icons { display: flex; gap: 6px; align-items: center; }

  /* Screen layout */
  .screen {
    flex: 1; min-height: 0; display: flex; flex-direction: column;
    background: var(--bg);
    position: relative;
  }
  .screen-scroll {
    flex: 1; min-height: 0; overflow-y: auto;
    scrollbar-width: thin;
  }
  .screen-scroll::-webkit-scrollbar { width: 4px; }
  .screen-scroll::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.08); border-radius: 2px; }

  /* Top header (in-screen) */
  .topbar {
    background: var(--white);
    padding: 8px 20px 16px;
    border-bottom: 1px solid var(--line);
    flex-shrink: 0;
  }
  .topbar.flush { padding-top: 16px; }
  .topbar-row { display: flex; align-items: center; justify-content: space-between; }
  .logo {
    display: flex; align-items: center; gap: 8px;
    font-weight: 700; color: var(--navy);
    font-size: 16px; letter-spacing: -0.01em;
  }
  .logo .mark {
    width: 30px; height: 30px;
    background: var(--navy);
    color: white;
    border-radius: 8px;
    display: inline-flex; align-items: center; justify-content: center;
    font-family: 'Inter', sans-serif; font-weight: 800; font-size: 14px;
    position: relative; overflow: hidden;
  }
  .logo .mark::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, var(--teal) 0%, transparent 55%);
  }
  .logo .mark span { position: relative; z-index: 1; }
  .logo .sub {
    font-size: 10px; font-weight: 500; color: var(--ink-60);
    letter-spacing: 0.06em; text-transform: uppercase; margin-top: -2px;
    font-family: 'JetBrains Mono', monospace;
  }
  .agency-name {
    font-size: 11px; color: var(--ink-60);
    text-align: right; line-height: 1.3;
  }
  .agency-name strong { color: var(--navy); display: block; font-size: 12px; font-weight: 600; }

  /* Generic */
  .btn {
    appearance: none; border: 0; cursor: pointer;
    font-family: inherit; font-weight: 600;
    border-radius: 12px; padding: 14px 18px;
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    font-size: 14px;
    transition: transform .08s ease, box-shadow .15s ease, background .15s ease;
  }
  .btn:active { transform: translateY(1px); }
  .btn-primary {
    background: var(--teal); color: white;
    box-shadow: 0 1px 0 rgba(255,255,255,0.2) inset, 0 1px 2px rgba(2,128,144,0.3);
  }
  .btn-primary:hover { background: var(--teal-700); }
  .btn-primary:disabled, .btn-primary.is-disabled {
    background: #C8CDD5; color: #FFFFFF; cursor: not-allowed;
    box-shadow: none;
  }
  .btn-ghost { background: transparent; color: var(--navy); }
  .btn-secondary { background: var(--white); color: var(--navy); border: 1px solid var(--line); }
  .btn-block { width: 100%; }
  .btn-icon { padding: 10px; border-radius: 12px; }

  /* Floating action button (New Application on Dashboard) */
  .cta-pill {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--navy); color: white;
    padding: 10px 14px; border-radius: 999px;
    font-size: 13px; font-weight: 600;
    border: 0; cursor: pointer;
    box-shadow: 0 4px 12px -2px rgba(26,31,46,0.4);
  }
  .cta-pill:hover { background: black; }

  /* Bottom nav */
  .bottomnav {
    flex-shrink: 0;
    display: flex; justify-content: space-around; align-items: center;
    padding: 8px 12px 22px;
    background: rgba(255,255,255,0.94);
    backdrop-filter: blur(14px);
    border-top: 1px solid var(--line);
  }
  .nav-item {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
    padding: 6px 0; cursor: pointer;
    color: var(--ink-40); font-size: 10px; font-weight: 600;
    background: transparent; border: 0; font-family: inherit;
    letter-spacing: 0.02em;
  }
  .nav-item.active { color: var(--teal); }
  .nav-item svg { width: 22px; height: 22px; }

  /* Cards */
  .card {
    background: var(--white); border-radius: 14px; border: 1px solid var(--line);
    padding: 16px;
  }
  .stack { display: flex; flex-direction: column; gap: 10px; }

  /* Stat headers */
  .col-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px; margin-top: 18px; margin-bottom: 8px;
  }
  .col-head h3 {
    margin: 0; font-size: 12px; font-weight: 700; color: var(--navy);
    letter-spacing: 0.04em; text-transform: uppercase;
  }
  .col-head .count {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    color: var(--ink-60); background: var(--bg); padding: 2px 8px; border-radius: 999px;
    border: 1px solid var(--line);
  }

  /* Nudge banner */
  .nudge {
    margin: 0 20px;
    background: linear-gradient(135deg, var(--teal-50) 0%, #F0FAFB 100%);
    border: 1px solid rgba(2,128,144,0.2);
    border-radius: 14px;
    padding: 14px 14px 14px 14px;
    position: relative;
    display: flex; gap: 12px; align-items: flex-start;
  }
  .nudge .ico {
    flex-shrink: 0; width: 32px; height: 32px; border-radius: 8px;
    background: var(--teal); color: white;
    display: inline-flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 13px;
  }
  .nudge p {
    margin: 0; font-size: 12.5px; line-height: 1.45; color: var(--navy);
  }
  .nudge p strong { color: var(--teal-700); }
  .nudge .x {
    position: absolute; top: 10px; right: 10px;
    background: transparent; border: 0; cursor: pointer;
    color: var(--ink-40); font-size: 16px; line-height: 1;
    width: 20px; height: 20px; display: inline-flex; align-items: center; justify-content: center;
  }

  /* Case card */
  .case-card {
    background: white; border-radius: 14px; border: 1px solid var(--line);
    padding: 14px; display: flex; flex-direction: column; gap: 10px;
    cursor: pointer;
    transition: transform .1s ease, box-shadow .15s ease;
  }
  .case-card:hover { transform: translateY(-1px); box-shadow: 0 4px 12px -2px rgba(0,0,0,0.06); }
  .case-card.amber { border-color: #F5D5A8; background: linear-gradient(180deg, #FFFBF3 0%, white 60%); }
  .case-card-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
  .case-tenant { font-size: 14.5px; font-weight: 600; color: var(--navy); }
  .case-prop { font-size: 12px; color: var(--ink-60); margin-top: 2px; }
  .case-days {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    background: var(--bg); border-radius: 6px; padding: 3px 7px;
    color: var(--ink-60); white-space: nowrap;
  }
  .case-days.amber { background: var(--amber-50); color: var(--amber); }
  .case-stage {
    display: flex; align-items: center; gap: 8px;
    font-size: 11.5px; color: var(--ink-60);
    font-family: 'JetBrains Mono', monospace;
    text-transform: uppercase; letter-spacing: 0.04em;
  }
  .case-stage .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--teal); }
  .case-stage .dot.amber { background: var(--amber); }
  .case-stage .dot.green { background: var(--green); }
  .case-stage .dot.idle { background: var(--ink-40); }

  /* Progress bar */
  .progress {
    width: 100%; height: 4px; background: var(--bg);
    border-radius: 99px; overflow: hidden; position: relative;
  }
  .progress > i {
    position: absolute; left: 0; top: 0; bottom: 0;
    background: var(--teal); border-radius: 99px;
    transition: width .4s ease;
  }
  .progress.green > i { background: var(--green); }
  .progress.amber > i { background: var(--amber); }

  /* Step indicator */
  .stepper-top {
    padding: 12px 20px 4px;
    background: white;
    border-bottom: 1px solid var(--line);
  }
  .stepper-row { display: flex; align-items: center; gap: 6px; }
  .stepper-row .seg {
    flex: 1; height: 3px; border-radius: 99px; background: var(--bg);
  }
  .stepper-row .seg.active { background: var(--teal); }
  .stepper-row .seg.done { background: var(--teal); opacity: 0.7; }
  .stepper-label {
    margin-top: 8px;
    display: flex; justify-content: space-between;
    font-family: 'JetBrains Mono', monospace; font-size: 10.5px;
    color: var(--ink-60); letter-spacing: 0.04em; text-transform: uppercase;
  }
  .stepper-label strong { color: var(--navy); font-weight: 600; }

  /* Profile cards */
  .pcard {
    background: white; border: 1.5px solid var(--line); border-radius: 14px;
    padding: 16px;
    display: flex; gap: 14px; align-items: flex-start;
    cursor: pointer;
    transition: border-color .15s ease, background .15s ease, transform .08s ease;
  }
  .pcard:hover { border-color: rgba(2,128,144,0.3); }
  .pcard.selected {
    border-color: var(--teal);
    background: linear-gradient(180deg, var(--teal-50) 0%, white 80%);
    box-shadow: 0 0 0 4px rgba(2,128,144,0.08);
  }
  .pcard .ico {
    width: 40px; height: 40px; border-radius: 10px;
    background: var(--bg); display: inline-flex; align-items: center; justify-content: center;
    color: var(--navy); flex-shrink: 0;
  }
  .pcard.selected .ico { background: var(--teal); color: white; }
  .pcard h4 { margin: 0 0 3px; font-size: 14.5px; font-weight: 600; color: var(--navy); }
  .pcard p { margin: 0; font-size: 11.5px; color: var(--ink-60); line-height: 1.4; }
  .pcard .radio {
    width: 18px; height: 18px; border-radius: 50%; border: 1.5px solid var(--line);
    flex-shrink: 0;
    position: relative;
  }
  .pcard.selected .radio { border-color: var(--teal); }
  .pcard.selected .radio::after {
    content: ''; position: absolute; inset: 3px; border-radius: 50%; background: var(--teal);
  }

  /* Checklist */
  .doc-row {
    background: white; border: 1px solid var(--line); border-radius: 12px;
    padding: 13px 14px;
    display: flex; gap: 12px; align-items: center;
  }
  .doc-row.uploaded { background: linear-gradient(180deg, var(--green-50) 0%, white 100%); border-color: rgba(5,150,105,0.2); }
  .doc-row.amber-flag { border-color: rgba(217,119,6,0.3); }
  .doc-check {
    width: 28px; height: 28px; border-radius: 8px;
    background: var(--bg); border: 1.5px solid var(--line);
    display: inline-flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .doc-check.done { background: var(--green); border-color: var(--green); color: white; }
  .doc-check.warn { background: var(--amber-50); border-color: var(--amber); color: var(--amber); }
  .doc-info { flex: 1; min-width: 0; }
  .doc-info .name { font-size: 13px; font-weight: 600; color: var(--navy); }
  .doc-info .meta { font-size: 11px; color: var(--ink-60); margin-top: 2px; }
  .doc-info .meta.amber-text { color: var(--amber); }
  .doc-action {
    flex-shrink: 0;
    background: var(--navy); color: white;
    border: 0; border-radius: 8px; padding: 7px 10px;
    font-size: 11px; font-weight: 600; cursor: pointer;
    font-family: inherit;
  }
  .doc-action.uploaded { background: transparent; color: var(--green); padding: 7px 4px; }

  /* Submit ribbon (sticky bottom in checklist) */
  .sticky-submit {
    background: rgba(255,255,255,0.96); backdrop-filter: blur(8px);
    border-top: 1px solid var(--line);
    padding: 14px 20px 20px;
  }
  .submit-helper {
    font-size: 11px; color: var(--ink-60); text-align: center; margin: 0 0 8px;
    font-family: 'JetBrains Mono', monospace; letter-spacing: 0.02em;
  }

  /* Status tracker */
  .tracker { display: flex; flex-direction: column; gap: 0; }
  .tr-step { display: flex; gap: 14px; align-items: flex-start; }
  .tr-stem {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    flex-shrink: 0; width: 24px;
  }
  .tr-bullet {
    width: 24px; height: 24px; border-radius: 50%;
    background: var(--bg); border: 1.5px solid var(--line);
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 11px; color: var(--ink-40);
    transition: all .3s ease;
  }
  .tr-bullet.done { background: var(--green); border-color: var(--green); color: white; }
  .tr-bullet.active {
    background: var(--teal); border-color: var(--teal); color: white;
    box-shadow: 0 0 0 4px rgba(2,128,144,0.18);
  }
  .tr-bullet.active::before {
    content: ''; position: absolute; width: 24px; height: 24px; border-radius: 50%;
    border: 2px solid var(--teal); animation: pulse 1.6s ease-out infinite;
  }
  @keyframes pulse {
    0% { transform: scale(1); opacity: 0.6; }
    100% { transform: scale(1.8); opacity: 0; }
  }
  .tr-line {
    width: 2px; flex: 1; min-height: 24px; background: var(--line);
  }
  .tr-line.done { background: var(--green); }
  .tr-body {
    padding-bottom: 18px; flex: 1; padding-top: 1px;
  }
  .tr-title {
    font-size: 14px; font-weight: 600; color: var(--navy);
  }
  .tr-title.muted { color: var(--ink-40); font-weight: 500; }
  .tr-meta {
    font-size: 11px; color: var(--ink-60); margin-top: 3px;
    font-family: 'JetBrains Mono', monospace;
  }
  .tr-meta.eta { color: var(--teal-700); font-weight: 600; }

  /* Quote */
  .quote-line {
    font-style: italic; color: var(--teal-700);
    font-size: 13px; line-height: 1.4;
    border-left: 2px solid var(--teal); padding-left: 10px;
    margin: 0 0 16px;
  }

  /* Message thread */
  .msg-thread { display: flex; flex-direction: column; gap: 10px; padding: 4px 0; }
  .msg {
    max-width: 80%; padding: 10px 12px; border-radius: 14px;
    font-size: 12.5px; line-height: 1.4;
  }
  .msg.them {
    align-self: flex-start; background: var(--bg); color: var(--navy);
    border-bottom-left-radius: 4px;
  }
  .msg.you {
    align-self: flex-end;
    background: var(--teal); color: white;
    border-bottom-right-radius: 4px;
  }
  .msg .who {
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.05em; opacity: 0.7; margin-bottom: 3px;
    font-family: 'JetBrains Mono', monospace;
  }
  .msg .time {
    font-size: 10px; opacity: 0.6; margin-top: 4px;
    font-family: 'JetBrains Mono', monospace;
  }

  /* Banners */
  .banner {
    border-radius: 12px; padding: 14px;
    display: flex; gap: 12px; align-items: flex-start;
  }
  .banner h4 { margin: 0 0 4px; font-size: 13px; font-weight: 700; }
  .banner p { margin: 0; font-size: 12px; line-height: 1.4; }
  .banner.amber { background: var(--amber-50); border: 1px solid rgba(217,119,6,0.2); }
  .banner.amber h4 { color: var(--amber); }
  .banner.amber p { color: #6B4317; }
  .banner.teal { background: var(--teal-50); border: 1px solid rgba(2,128,144,0.2); }
  .banner.teal h4 { color: var(--teal-700); }
  .banner.teal p { color: var(--navy); }
  .banner.green { background: var(--green-50); border: 1px solid rgba(5,150,105,0.2); }
  .banner.green h4 { color: var(--green); }
  .banner .ico {
    flex-shrink: 0; width: 28px; height: 28px; border-radius: 8px;
    display: inline-flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 13px;
  }
  .banner.amber .ico { background: var(--amber); color: white; }
  .banner.teal .ico { background: var(--teal); color: white; }
  .banner.green .ico { background: var(--green); color: white; }

  /* Form */
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .label {
    font-size: 11px; font-weight: 600; color: var(--navy);
    text-transform: uppercase; letter-spacing: 0.06em;
    font-family: 'JetBrains Mono', monospace;
  }
  .input {
    background: white; border: 1px solid var(--line); border-radius: 10px;
    padding: 12px 14px; font-size: 14px; color: var(--navy);
    font-family: inherit;
    display: flex; align-items: center; gap: 8px;
  }
  .input.with-icon { padding-left: 12px; }
  .summary-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid var(--line);
    font-size: 13px;
  }
  .summary-row:last-child { border-bottom: 0; }
  .summary-row .k { color: var(--ink-60); font-size: 12px; }
  .summary-row .v { color: var(--navy); font-weight: 600; text-align: right; }

  /* Result */
  .result-hero {
    padding: 40px 24px 28px;
    text-align: center;
  }
  .result-circle {
    width: 92px; height: 92px; border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    margin-bottom: 18px;
    position: relative;
  }
  .result-circle.green { background: var(--green-50); color: var(--green); }
  .result-circle.green::after {
    content: ''; position: absolute; inset: -8px; border-radius: 50%;
    border: 2px solid rgba(5,150,105,0.25);
  }
  .result-circle.amber { background: var(--amber-50); color: var(--amber); }
  .result-circle.amber::after {
    content: ''; position: absolute; inset: -8px; border-radius: 50%;
    border: 2px solid rgba(217,119,6,0.25);
  }
  .result-title { font-size: 26px; font-weight: 700; color: var(--navy); margin: 0 0 8px; letter-spacing: -0.02em; }
  .result-sub { font-size: 13px; color: var(--ink-60); margin: 0; line-height: 1.45; }

  .num-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 10px; }

  .chip {

    border: 1px solid rgba(5,150,105,0.25);
    padding: 6px 10px; border-radius: 999px;
    font-size: 12px; font-weight: 600;

  /* Section title in content */
  .h-sec { font-size: 16px; font-weight: 700; color: var(--navy); margin: 0 0 4px; letter-spacing: -0.01em; }

  .mb-6 { margin-bottom: 6px; } .mb-10 { margin-bottom: 10px; }

  /* Header back button row */

  /* Flow connectors (dashed lines between phones) */

  /* State toggle pill */
  .state-toggle {
    position: absolute; top: -38px; left: 50%; transform: translateX(-50%);
