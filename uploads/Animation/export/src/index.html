<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<meta name="ext-resource-dependency" content="assets/maria.png" data-resource-id="maria">
<meta name="ext-resource-dependency" content="assets/pepe.png" data-resource-id="pepe">

<template id="__bundler_thumbnail">

    <circle cx="200" cy="140" r="44" fill="#e8501a"/>
    <circle cx="120" cy="260" r="36" fill="#9b9385"/>
    <circle cx="280" cy="260" r="36" fill="#9b9385"/>

    <line x1="244" y1="240" x2="216" y2="170" stroke="#1a1714" stroke-width="4" stroke-linecap="round"/>
    <line x1="155" y1="265" x2="245" y2="265" stroke="#1a1714" stroke-width="4" stroke-linecap="round"/>
    <text x="200" y="350" text-anchor="middle" font-family="Inter, sans-serif" font-size="24" font-weight="700" fill="#1a1714">María in the middle</text>

<style>
  html, body, #root { margin: 0; padding: 0; height: 100%; width: 100%; background: #0a0a0a; overflow: hidden; }
  body { font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="animations.jsx"></script>
  <script type="text/babel" src="scene-data.jsx"></script>
  <script type="text/babel" src="scene-parts.jsx"></script>
  <script type="text/babel" src="scene.jsx"></script>

  <script type="text/babel">
    function App() {
      return (
        <Stage width={STAGE_W} height={STAGE_H} duration={TOTAL_DUR}
               background="#faf7f2" persistKey="maria-animation">
          <Scene/>
        </Stage>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
